name: Release

# Creates a GitHub Release (with changelog), which triggers deploy.yml.
# For partial re-deploys (api-only, web-only) use deploy.yml workflow_dispatch directly.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3)'
        required: true
      changelog:
        description: 'Changelog / release notes (markdown supported)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create release v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          echo "$CHANGELOG" > /tmp/release-notes.md
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --latest
