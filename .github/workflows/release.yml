name: Release

# Creates a release/v<version> tag, which automatically triggers deploy.yml
# (on.push.tags: release/v*) to run CI → deploy API → health check → deploy web.
# For partial re-deploys (api-only, web-only) use deploy.yml workflow_dispatch directly.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3)'
        required: true

permissions:
  contents: write

jobs:
  tag:
    name: Tag release/v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "release/v${{ inputs.version }}"
          git push origin "release/v${{ inputs.version }}"
