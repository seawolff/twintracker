name: Release

# Creates a GitHub Release with changelog, then explicitly triggers deploy.yml.
# (GITHUB_TOKEN-created releases don't fire the release: published event, so we
# trigger the deploy workflow directly via gh workflow run after creating the release.)
# Tag format:
#   v1.2.3       → deploys both API and web
#   api/v1.2.3   → deploys API only
#   web/v1.2.3   → deploys web only
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3)'
        required: true
      service:
        description: 'Which service to release'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - api
          - web
      changelog:
        description: 'Changelog / release notes (markdown supported)'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Release ${{ inputs.service }} v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag name
        id: tag
        run: |
          # Strip leading 'v' from version input so entering "1.0.0" or "v1.0.0" both work
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          if [ "${{ inputs.service }}" = "both" ]; then
            echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "title=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.service }}/v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "title=${{ inputs.service }} v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          echo "$CHANGELOG" > /tmp/release-notes.md
          gh release create "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.title }}" \
            --notes-file /tmp/release-notes.md \
            --latest

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml \
            --ref main \
            --field service=${{ inputs.service }}
