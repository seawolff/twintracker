name: Rollback

# Manual rollback to a specific GitHub Release tag (e.g. v1.2.3).
# Use this when you need to recover from a bad deploy that passed the health check
# but caused issues in production (the auto-rollback in deploy.yml covers deploy-time failures).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Full tag to roll back to (e.g. v1.2.3, api/v1.2.3, web/v1.2.3)'
        required: true
      service:
        description: 'Which service to roll back'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - api
          - web

jobs:
  rollback-api:
    name: Rollback API to ${{ inputs.version }}
    if: inputs.service == 'both' || inputs.service == 'api'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API at ${{ inputs.version }}
        run: railway up --service TwinTracker-API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Notify rollback
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "## ⚠️ Manual API rollback" >> "$GITHUB_STEP_SUMMARY"
          echo "API rolled back to **${{ inputs.version }}** by @${{ github.actor }}." >> "$GITHUB_STEP_SUMMARY"
          echo "**Run:** $RUN_URL" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"⚠️ *TwinTracker API manual rollback* to \`${{ inputs.version }}\` by @${{ github.actor }}. <$RUN_URL|View run>\"
              }"
          fi

  rollback-web:
    name: Rollback Web to ${{ inputs.version }}
    if: inputs.service == 'both' || inputs.service == 'web'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Web at ${{ inputs.version }}
        run: railway up --service TwinTracker-Web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
